<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="acesso-negado.css">
  <link rel="stylesheet" href="./global.css">
  <link rel="stylesheet" href="./layout/layout.css">

  <title>Acesso Negado</title>

  <link rel="icon" type="image/png" href="./images/AAPM-Logo-Preto.png">

</head>

<body>

  <div class="principal-box">
    <section class="erro-card">

      <div class="erro-icon">
        <span class="material-symbols-outlined">lock</span>
      </div>

      <h1>Acesso Negado</h1>

      <p>
        Seu perfil não possui permissão para acessar esta funcionalidade do sistema AAPM.
        Caso necessário, entre em contato com a administração.
      </p>

      <button id="acessoVoltar" class="btn btn-primary">
        Voltar para o login
      </button>

    </section>
  </div>


  
  <script src="../../utils/app.js"></script>

  <script>
    document.getElementById("acessoVoltar").addEventListener("click", () => {
      window.location.href = "/frontEnd/pages/index.html";
    });
  </script>

</body>

</html>
